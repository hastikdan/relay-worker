name = "relay-worker"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

# KV namespace for SOM cache
# Create with: wrangler kv:namespace create "SOM_CACHE"
# Then replace the id below with the output id
[[kv_namespaces]]
binding = "SOM_CACHE"
id      = "REPLACE_WITH_YOUR_KV_NAMESPACE_ID"

[vars]
# Override in wrangler secret or Cloudflare dashboard — never commit real values
RELAY_API_URL     = "https://relay-backend.onrender.com"
RELAY_API_KEY     = ""   # set via: wrangler secret put RELAY_API_KEY
SOM_CACHE_TTL_SEC = "300"   # 5 minutes
CONFIG_CACHE_TTL_SEC = "60" # re-fetch publisher config every 60s

[observability]
enabled = true
